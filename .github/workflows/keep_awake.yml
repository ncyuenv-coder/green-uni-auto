name: Keep Streamlit App Awake (Playwright)

on:
  schedule:
    # 建議每 8 小時執行一次
    - cron: "0 */8 * * *" 
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安裝 Playwright 套件
        run: |
          pip install playwright
          playwright install chromium
          
      - name: 執行 Playwright 真實瀏覽器喚醒腳本
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          
          url = 'https://green-uni-auto-kweygzlbf2tqmytn97a3wr.streamlit.app/'
          
          with sync_playwright() as p:
              # 啟動隱形 Chrome 瀏覽器
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              print('正在模擬真實使用者開啟網頁...')
              
              try:
                  # 前往網址，並等待網路活動靜止 (確保 JavaScript 完全載入並執行)
                  page.goto(url, wait_until='networkidle', timeout=60000)
                  
                  print(f'成功載入，目前網頁標題: {page.title()}')
                  
                  # 關鍵步驟：強制停留 15 秒
                  # 這段時間能確保 Streamlit 的 WebSocket (/stream) 成功連線並註冊活躍狀態
                  print('正在維持頁面開啟，等待 WebSocket 連線...')
                  time.sleep(15)
                  
                  print('喚醒/保活程序順利完成！')
                  
              except Exception as e:
                  print(f'載入網頁時發生錯誤: {e}')
                  exit(1)
              finally:
                  browser.close()
          "
